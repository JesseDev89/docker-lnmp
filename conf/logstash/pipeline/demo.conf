input {
  beats {
    port => 5044
  }
}

filter {
  # 先转移 metadata
  if [fields][index_prefix] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "%{[fields][index_prefix]}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "default-logs" }
    }
  }

  # 1. 解析 JSON
  json {
    source => "message"
  }

  # 2. 处理时间戳 - 在重命名之前执行
  if [time] {
    date {
      match => [ "time", "ISO8601" ]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  }

  # 4. 字段重命名和清理
  mutate {
    # 将 'msg' 映射为标准的 'message'
    rename => { "msg" => "message" }

    # 将 @timestamp 格式化为 "yyyy.MM.dd HH:mm:ss"
    replace => { "@timestamp" => "%{+yyyy.MM.dd HH:mm:ss}" }

    # 将 'type' 映射为标准的 'log.level'
    rename => { "type" => "log.level" }

    # 清理冗余字段
    remove_field => [ "time", "host", "path", "@version", "fields", "tags" ]
  }
}

# ==========================================
# Output: 发送到 Elasticsearch
# ==========================================
output {
  stdout {
    codec => rubydebug
  }

  elasticsearch {
    hosts => ["${ES_HOST}:${ES_PORT}"]

    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}-log"

    user => "${ES_USER}"
    password => "${ES_PASSWORD}"
  }
}