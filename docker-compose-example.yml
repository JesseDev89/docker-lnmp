services:
  # PHP Services
  php7.4:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/php:7.4
    container_name: jesse-php7.4-service
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${WEB_ROOT_PATH}:/www
      - ${CONF_PATH}/php7.4/conf.d/php.ini:/usr/local/app/php7.4/etc/conf.d/php.ini
      - ${CONF_PATH}/php7.4/php-fpm.d/:/usr/local/app/php7.4/etc/php-fpm.d
      - ${LOG_PATH}/php7.4/:/var/log/
    working_dir: /www
    networks:
      - jesse-network

  php8.0:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/php:8.0
    container_name: jesse-php8.0-service
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${WEB_ROOT_PATH}:/www
      - ${CONF_PATH}/php8.0/conf.d/php.ini:/usr/local/app/php8.0/etc/conf.d/php.ini
      - ${CONF_PATH}/php8.0/php-fpm.d/:/usr/local/app/php8.0/etc/php-fpm.d
      - ${LOG_PATH}/php8.0/:/var/log/
    working_dir: /www
    networks:
      - jesse-network

  php8.1:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/php:8.1
    container_name: jesse-php8.1-service
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${WEB_ROOT_PATH}:/www
      - ${CONF_PATH}/php8.1/conf.d/php.ini:/usr/local/app/php8.1/etc/conf.d/php.ini
      - ${CONF_PATH}/php8.1/php-fpm.d/:/usr/local/app/php8.1/etc/php-fpm.d
      - ${LOG_PATH}/php8.1/:/var/log/
    working_dir: /www
    networks:
      - jesse-network

  php8.2:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/php:8.2
    container_name: jesse-php8.2-service
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${WEB_ROOT_PATH}:/www
      - ${CONF_PATH}/php8.2/conf.d/php.ini:/usr/local/app/php8.2/etc/conf.d/php.ini
      - ${CONF_PATH}/php8.2/php-fpm.d/:/usr/local/app/php8.2/etc/php-fpm.d
      - ${LOG_PATH}/php8.2/:/var/log/
    working_dir: /www
    networks:
      - jesse-network

  php8.0-swoole:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/php:php8.0-swoole
    container_name: jesse-php8.0-swoole-service
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${WEB_ROOT_PATH}:/www
      - ${CONF_PATH}/php8.0-swoole/conf.d/php.ini:/usr/local/app/php8.0/etc/conf.d/php.ini
      - ${LOG_PATH}/php8.0-swoole/:/var/log/
    working_dir: /www
    networks:
      - jesse-network

  # Database Services
  mysql:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/mysql:8.0
    container_name: jesse-mysql8.0-service
    platform: linux/amd64
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ${CONF_PATH}/mysql/my.cnf:/usr/local/app/mysql/etc/my.cnf
      - ${STORE_PATH}/mysql/data:/usr/local/app/mysql/data
      - ${LOG_PATH}/mysql:/var/log/mysql
    ports:
      - ${MYSQL8_PORT}:3306
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql5.7:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/mysql:5.7
    container_name: jesse-mysql5.7-service
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ${CONF_PATH}/mysql5.7/my.cnf:/etc/mysql/my.cnf
      - ${STORE_PATH}/mysql5.7/data:/usr/local/app/mysql/data
      - ${LOG_PATH}/mysql5.7:/var/log/mysql
    ports:
      - ${MYSQL_PORT}:3306
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/redis:6.2.9
    container_name: jesse-redis6.2.5-service
    restart: always
    command: redis-server /usr/local/app/redis/conf/redis.conf
    volumes:
      - ${CONF_PATH}/redis/redis.conf:/usr/local/app/redis/conf/redis.conf
      - ${LOG_PATH}/redis/:/usr/local/app/redis/logs
      - ${STORE_PATH}/redis/:/usr/local/app/redis/data
    ports:
      - ${REDIS_PORT}:6379
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web Server
  nginx:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/nginx:1.2.1
    container_name: jesse-nginx-service
    restart: always
    volumes:
      - ${CONF_PATH}/nginx/conf/nginx.conf:/usr/local/app/nginx/conf/nginx.conf
      - ${CONF_PATH}/nginx/conf/conf.d:/usr/local/app/nginx/conf/conf.d
      - ${LOG_PATH}/nginx/log:/usr/local/app/nginx/logs
      - ${WEB_ROOT_PATH}:/www
    ports:
      - ${NGINX_PORT}:80
    depends_on:
      - php7.4
      - php8.0
      - php8.1
      - php8.2
    networks:
      - jesse-network

  # Message Queue & Search
  rabbitmq:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/rabbitmq:4.2.5
    container_name: jesse-rabbitmq-service
    restart: always
    hostname: jesse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - ${STORE_PATH}/rabbitmq/data/:/var/lib/rabbitmq
      - ${LOG_PATH}/rabbitmq/:/var/log/rabbitmq
      - ${CONF_PATH}/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - ${RABBITMQ_PORT}:5672
      - ${RABBITMQ_UI_PORT}:15672
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongodb:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/mongodb:8.2.7
    container_name: jesse-mongodb-service
    restart: always
    command: mongod --config /etc/mongod.conf
    volumes:
      - ${STORE_PATH}/mongodb/data/:/usr/local/app/mongodb/data/
      - ${LOG_PATH}/mongodb/:/usr/local/app/mongodb/log
      - ${CONF_PATH}/mongodb/mongod.conf:/usr/local/app/mongodb/conf/mongod.conf
    ports:
      - ${MONGODB_PORT}:27017
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/elasticsearch:7.14.2
    container_name: jesse-elasticsearch-service
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-a123456}
      - xpack.security.enabled=true
    volumes:
      - ${STORE_PATH}/elasticsearch/data/:/usr/local/app/elasticsearch/data
      - ${LOG_PATH}/elasticsearch/:/usr/local/app/elasticsearch/logs
      - ${CONF_PATH}/elasticsearch/elasticsearch.yml:/usr/local/app/elasticsearch/config/elasticsearch.yml
      - ${CONF_PATH}/elasticsearch/jvm.options.d:/usr/local/app/elasticsearch/config/jvm.options.d
    ports:
      - ${ELASTICSEARCH_PORT}:9200
    networks:
      - jesse-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  kibana:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/kibana:7.14.2
    container_name: jesse-kibana-service
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-a123456}
    volumes:
      - ${STORE_PATH}/kibana/data/:/usr/local/app/kibana/data
      - ${LOG_PATH}/kibana/:/usr/local/app/kibana/logs
      - ${CONF_PATH}/kibana/kibana.yml:/usr/local/app/kibana/config/kibana.yml
    ports:
      - ${KIBANA_PORT}:5601
    depends_on:
      - elasticsearch
    networks:
      - jesse-network

  logstash:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/logstash:7.14.2
    container_name: jesse-logstash-service
    restart: always
    environment:
      - ES_HOST=jesse-elasticsearch-service
      - ES_PORT=9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD:-a123456}
    volumes:
      - ${CONF_PATH}/logstash/config:/usr/local/app/logstash/config/
      - ${CONF_PATH}/logstash/pipeline:/usr/local/app/logstash/pipeline
      - ${LOG_PATH}/logstash/:/usr/local/app/logstash/log
      - ${STORE_PATH}/logstash/:/usr/local/app/logstash/data
    ports:
      - ${LOGSTASH_PORT}:5044
      - ${LOGSTASH_UI_PORT}:9600
    depends_on:
      - elasticsearch
    networks:
      - jesse-network

  # Service Discovery
  nacos2.2.3:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/nacos:2.2.3
    container_name: jesse-nacos2.2.3-standalone
    restart: on-failure
    environment:
      - NACOS_AUTH_IDENTITY_KEY=${NACOS_AUTH_IDENTITY_KEY:-N78hhSHC73PM}
      - NACOS_AUTH_IDENTITY_VALUE=${NACOS_AUTH_IDENTITY_VALUE:-GA9CKifJzdb3}
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890193456789012345678901234567890123456729}
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql5.7
      - MYSQL_SERVICE_DB_NAME=nacos2.2.3
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false
    volumes:
      - ${LOG_PATH}/nacos2.2.3/:/home/nacos/logs
      - ${CONF_PATH}/nacos2.2.3/custom.properties:/home/nacos/init.d/custom.properties
    ports:
      - ${NACOS_PORT}:8848
    depends_on:
      mysql5.7:
        condition: service_healthy
    networks:
      - jesse-network
  # Application Services
  jesse-mirco:
    image: hyperf/hyperf:8.3-alpine-v3.19-swoole
    container_name: jesse-mirco
    restart: always
    tty: true
    stdin_open: true
    volumes:
      - ${WEB_ROOT_PATH}:/www
    working_dir: /www
    entrypoint: /bin/bash
    ports:
      - 9501:9501
    depends_on:
      - mysql5.7
      - redis
      - rabbitmq
    networks:
      - jesse-network

  jesse-zipkin:
    image: openzipkin/zipkin:2.22
    container_name: jesse-zipkin-service
    restart: always
    ports:
      - "9411:9411"
    networks:
      - jesse-network

  # Monitoring & Management
  portainer:
    image: portainer/portainer-ce:latest
    container_name: jesse-portainer-service
    restart: always
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${STORE_PATH}/portainer/data/:/data
    networks:
      - jesse-network

  filebeat:
    image: registry.cn-guangzhou.aliyuncs.com/jesse-dnmp/filebeat:7.14.2
    container_name: jesse-filebeat-service
    restart: always
    volumes:
      - ${CONF_PATH}/filebeat/filebeat.yml:/usr/local/app/filebeat/filebeat.yml
      - ${WEB_ROOT_PATH}:/www
    networks:
      - jesse-network
    depends_on:
      - logstash
# Networks
networks:
  jesse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 171.0.1.0/24
          gateway: 171.0.1.1