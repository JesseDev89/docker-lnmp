input {
  beats {
    port => 5044
  }
}

filter {
  # 先转移 metadata
  if [fields][index_prefix] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "%{[fields][index_prefix]}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "default-logs" }
    }
  }

  # 1. 解析 JSON
  json {
    source => "message"
    target => "json_data"
  }

  # 2. 提取字段到根级别
  if [json_data] {
    mutate {
      rename => { "[json_data][type]" => "log.level" }
      rename => { "[json_data][msg]" => "message" }
      rename => { "[json_data][time]" => "_raw_time" }
    }
  }

  # 3. 处理时间戳
  if [_raw_time] {
    date {
      match => [ "_raw_time", "ISO8601" ]
      target => "@timestamp"
      timezone => "Asia/Shanghai"
    }
  }

  # 4. 清理冗余字段
  mutate {
    remove_field => [ "_raw_time", "host", "path", "@version", "fields", "tags", "json_data", "log", "input", "agent", "ecs" ]
  }
}

# ==========================================
# Output: 发送到 Elasticsearch
# ==========================================
output {
  stdout {
    codec => rubydebug
  }

  elasticsearch {
    hosts => ["${ES_HOST}:${ES_PORT}"]

    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}-log"

    user => "${ES_USER}"
    password => "${ES_PASSWORD}"
  }
}