# ==========================================
# Input: 接收来自 Filebeat 的日志数据
# ==========================================
input {
  beats {
    port => 5044
    # 如果你的网络环境复杂，可以增加以下参数以提高稳定性
    # client_inactivity_timeout => 600
  }
}

# ==========================================
# Filter: 解析和处理 TP8 日志
# ==========================================
filter {
  # --- 第一步：解析 JSON ---
  # 假设你已经在 TP8 的 config/log.php 中开启了 'json' => true
  # Logstash 会尝试将 "message" 字段的内容解析为 JSON 对象
  json {
    source => "message"
    # 如果日志行不是有效的 JSON（比如启动信息、错误堆栈），跳过解析，避免丢弃整条日志
    skip_on_invalid_json => true
    # 将解析后的字段直接提升到顶层，方便后续处理
    target => "log"
  }

  # --- 第二步：处理时间戳 ---
  # TP8 JSON 日志中的时间字段通常是 "time"
  if [log][time] {
    date {
      match => ["%{[log][time]}", "ISO8601"]
      target => "@timestamp"
      # 解析成功后，移除原始的 time 字段，避免重复
      remove_field => ["[log][time]"]
    }
  }

  # --- 第三步：设置索引类型和来源 ---
  # 添加一些元数据，方便在 Kibana 中筛选和分析
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "tp8-logs"
      "service.name" => "thinkphp8"
      "host.name" => "%{[host][name]}"
    }
  }

  # --- 第四步（可选）：处理多行异常堆栈 ---
  # 如果你的应用会记录异常，并且这些异常跨越多行，
  # 你需要在 Filebeat 端配置 multiline.pattern。
  # Logstash 这里假设 Filebeat 已经将完整的异常合并为一行。
  # 如果没有，你可能需要在这里使用 aggregate 或其他插件，但这会增加复杂度。
}

# ==========================================
# Output: 发送到 Elasticsearch
# ==========================================
output {
  stdout {
    codec => rubydebug
  }

  elasticsearch {
    hosts => ["${ES_HOST}:${ES_PORT}"]

    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"

    user => "${ES_USER}"
    password => "${ES_PASSWORD}"

    manage_template => false
    ilm_enabled => false

    ecs_compatibility => disabled
  }
}