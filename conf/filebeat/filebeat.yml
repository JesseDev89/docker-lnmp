filebeat.inputs:
  # --- 输入配置：监控 ThinkPHP 8 日志 ---
  - type: log
    id: project-logs
    enabled: true

    # 1. 路径配置：匹配 TP8 默认的按日期分目录的日志格式
    paths:
      - /www/channel_saas_web/server/runtime/log/**/*.log
    # 2. JSON 解析配置
    json:
      keys_under_root: true
      overwrite_keys: true
      add_error_key: true
      message_key: "msg"

    processors:
      # 先删除自动生成的冗余字段
      - drop_fields:
          fields: ["host", "agent", "ecs", "input"]
          ignore_missing: true

      # 重命名字段（仅当字段存在时）
      - rename:
          ignore_missing: true
          fields:
            - from: "type"
              to: "log.level"
            - from: "time"
              to: "datetime"

      # 如果 msg 没有被 json.message_key 处理,则手动复制到 message
      - copy_fields:
          fail_on_error: false
          ignore_missing: true
          fields:
            - from: "msg"
              to: "message"

      # 删除原始的 msg 字段(如果还存在)
      - drop_fields:
          fields: ["msg"]
          ignore_missing: true

      # 处理 JSON 解析错误：如果不是 JSON，保留原始 message
      - if:
          has_fields: ['error']
        then:
          - drop_fields:
              fields: ["error"]
              ignore_missing: true

  # --- 可选：如果你还有其他应用日志 ---
  # - type: log ...

# ==================================
# 输出配置：直接发送到 Elasticsearch
# ==================================
output.elasticsearch:
  hosts: ["http://jesse-elasticsearch-service:9200"]
  index: "channel_saas_web-%{+yyyy.MM.dd}-log"
  username: "elastic"
  password: "a123456"

setup.template.enabled: false
setup.ilm.enabled: false

# ==================================
# 时间戳处理
# ==================================
timestamp:
  field: "time"
  layout: "2006-01-02T15:04:05"
  layout_timezone: "Asia/Shanghai"

# ==================================
# 禁用监控避免 PID 1 错误
# ==================================
logging.metrics.enabled: false